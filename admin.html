
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-Panel | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --sidebar: #ffffff;
            --text-main: #1e293b;
            --accent: #f093fb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }

        body { background-color: var(--bg); color: var(--text-main); display: flex; min-height: 100vh; }

        /* Sidebar Navigation */
        nav { width: 260px; background: var(--sidebar); border-right: 1px solid #e2e8f0; padding: 24px; display: flex; flex-direction: column; }
        .logo { font-weight: 800; font-size: 22px; color: var(--primary); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 12px 16px; border-radius: 12px; color: #64748b; text-decoration: none; margin-bottom: 8px; transition: 0.3s; cursor: pointer; }
        .nav-item.active { background: #eef2ff; color: var(--primary); font-weight: 600; }
        .nav-item:hover:not(.active) { background: #f1f5f9; }

        /* Main Content Area */
        main { flex: 1; padding: 40px; overflow-y: auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        
        /* Stats Row */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, min-minmax(200px, 1fr)); gap: 24px; margin-bottom: 32px; }
        .stat-card { background: white; padding: 24px; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .stat-card i { color: var(--primary); margin-bottom: 12px; font-size: 20px; }
        .stat-val { font-size: 24px; font-weight: 700; }
        .stat-label { font-size: 13px; color: #64748b; margin-top: 4px; }

        /* Dashboard Layout */
        .content-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 32px; }

        /* Control Form */
        .glass-panel { background: white; padding: 32px; border-radius: 24px; border: 1px solid #e2e8f0; }
        .field-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #475569; }
        input { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid #cbd5e1; background: #f8fafc; font-size: 15px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
        
        .update-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #6366f1, #a855f7); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .update-btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* History Log */
        .history-panel { background: white; border-radius: 24px; border: 1px solid #e2e8f0; padding: 24px; max-height: 500px; overflow-y: auto; }
        .history-item { display: flex; gap: 12px; padding: 16px 0; border-bottom: 1px solid #f1f5f9; }
        .history-item:last-child { border: none; }
        .h-icon { width: 36px; height: 36px; background: #f1f5f9; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--primary); }
        .h-info p { font-size: 14px; font-weight: 500; }
        .h-info span { font-size: 11px; color: #94a3b8; }

        /* Login Overlay */
        #authOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        
        @media (max-width: 1000px) { .content-grid { grid-template-columns: 1fr; } nav { display: none; } }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="glass-panel" style="width: 350px; text-align: center;">
            <i class="fa-solid fa-shield-halved" style="font-size: 40px; color: var(--primary); margin-bottom: 20px;"></i>
            <h2>Admin Access</h2>
            <p style="font-size: 14px; color: #64748b; margin: 10px 0 24px;">Enter password to manage __S__ projects</p>
            <input type="password" id="adminPass" placeholder="••••••••" style="text-align: center;">
            <button class="update-btn" onclick="checkAuth()">Unlock Dashboard</button>
        </div>
    </div>

    <nav>
        <div class="logo"><i class="fa-solid fa-moon"></i> S-Panel</div>
        <div class="nav-item active"><i class="fa-solid fa-chart-line"></i> &nbsp; Overview</div>
        <div class="nav-item"><i class="fa-solid fa-calendar-check"></i> &nbsp; Events</div>
        <div class="nav-item"><i class="fa-solid fa-gears"></i> &nbsp; Settings</div>
        <div style="margin-top: auto;" class="nav-item" onclick="location.reload()"><i class="fa-solid fa-right-from-bracket"></i> &nbsp; Logout</div>
    </nav>

    <main>
        <header>
            <div>
                <h1>Welcome back, __S__</h1>
                <p style="color: #64748b; font-size: 14px;">Managing: celebration_config</p>
            </div>
            <div id="liveClock" style="font-weight: 600; color: var(--primary);"></div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <i class="fa-solid fa-users"></i>
                <div class="stat-val">1.2k</div>
                <div class="stat-label">Expected Visitors</div>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-bolt"></i>
                <div class="stat-val">Live</div>
                <div class="stat-label">System Status</div>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-database"></i>
                <div class="stat-val">Supabase</div>
                <div class="stat-label">Database Connected</div>
            </div>
        </div>

        <div class="content-grid">
            <div class="glass-panel">
                <h3 style="margin-bottom: 24px;">Update Celebration Info</h3>
                <div class="field-group">
                    <label>EVENT NAME</label>
                    <input type="text" id="evName" placeholder="Loading...">
                </div>
                <div class="field-group">
                    <label>TARGET DATE & TIME</label>
                    <input type="datetime-local" id="evDate">
                </div>
                <button class="update-btn" id="saveBtn" onclick="saveChanges()">Push Live Update</button>
                <div id="statusMsg" style="text-align: center; margin-top: 15px; font-size: 13px; font-weight: 600;"></div>
            </div>

            <div class="history-panel">
                <h3 style="margin-bottom: 20px;">Change History</h3>
                <div id="historyList">
                    </div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://gevhkmpynlwhxohvsszw.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdldmhrbXB5bmx3aHhvaHZzc3p3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMTc5OTcsImV4cCI6MjA5Mzg5Mzk5N30.leq6VvuNVYoj_f2V8Qpk-4a0HneIE9YuDpxUW9Pd0_E';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. Auth Check
        function checkAuth() {
            if(document.getElementById('adminPass').value === "Eid@2026") {
                document.getElementById('authOverlay').style.display = 'none';
                loadData();
                renderHistory();
            } else { alert("Wrong password."); }
        }

        // 2. Load Data from Supabase
        async function loadData() {
            const { data } = await _supabase.from('celebration_config').select('*').eq('id', 1).single();
            if(data) {
                document.getElementById('evName').value = data.event_name;
                // Format date for input
                const date = new Date(data.target_date);
                date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
                document.getElementById('evDate').value = date.toISOString().slice(0, 16);
            }
        }

        // 3. Save Changes & Log to LocalStorage
        async function saveChanges() {
            const btn = document.getElementById('saveBtn');
            const name = document.getElementById('evName').value;
            const date = document.getElementById('evDate').value;
            const status = document.getElementById('statusMsg');

            btn.disabled = true;
            const { error } = await _supabase.from('celebration_config').update({
                event_name: name,
                target_date: new Date(date).toISOString()
            }).eq('id', 1);

            if(!error) {
                status.style.color = "#10b981";
                status.innerText = "Successfully pushed to live site!";
                addToHistory(name, date);
            } else {
                status.style.color = "#ef4444";
                status.innerText = "Error: " + error.message;
            }
            
            btn.disabled = false;
            setTimeout(() => status.innerText = "", 3000);
        }

        // 4. LocalStorage History Logic
        function addToHistory(name, date) {
            const logs = JSON.parse(localStorage.getItem('change_logs') || '[]');
            logs.unshift({
                name: name,
                time: new Date().toLocaleString(),
                target: new Date(date).toLocaleDateString()
            });
            localStorage.setItem('change_logs', JSON.stringify(logs.slice(0, 10))); // Keep last 10
            renderHistory();
        }

        function renderHistory() {
            const logs = JSON.parse(localStorage.getItem('change_logs') || '[]');
            const list = document.getElementById('historyList');
            if(logs.length === 0) {
                list.innerHTML = `<p style="color:#94a3b8; font-size: 13px;">No recent changes.</p>`;
                return;
            }
            list.innerHTML = logs.map(log => `
                <div class="history-item">
                    <div class="h-icon"><i class="fa-solid fa-pen-to-square"></i></div>
                    <div class="h-info">
                        <p>Updated to "${log.name}"</p>
                        <span>Changed on ${log.time}</span>
                    </div>
                </div>
            `).join('');
        }

        // Clock
        setInterval(() => {
            document.getElementById('liveClock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
