
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Feed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --s: #a855f7; --gold: #f59e0b; --bg: #0f172a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* RESTORED BACKGROUND CSS */
        body { 
            background: var(--bg); 
            color: white; 
            min-height: 100vh; 
            padding-bottom: 100px; 
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99,102,241,0.15) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(168,85,247,0.15) 0%, transparent 40%);
        }

        .container { width: 100%; max-width: 500px; margin: 0 auto; padding: 20px; }

        /* HEADER */
        .glass-nav {
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 24px;
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between;
            align-items: center; 
            position: sticky; 
            top: 15px; 
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .balance { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 18px; }
        .balance i { color: var(--gold); filter: drop-shadow(0 0 5px var(--gold)); }

        /* POST CARDS */
        .post {
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px; 
            padding: 20px; 
            margin-top: 15px; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .post:hover { 
            border-color: var(--p); 
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-2px);
        }
        
        .u-name { color: var(--p); font-weight: 800; font-size: 14px; margin-bottom: 10px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
        .u-msg { font-size: 16px; line-height: 1.6; color: #cbd5e1; word-break: break-word; }
        .u-meta { 
            margin-top: 15px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; font-size: 11px; color: #64748b; font-weight: 600;
        }

        /* FAB */
        .fab {
            position: fixed; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%);
            width: calc(100% - 40px); 
            max-width: 460px; 
            background: white; 
            color: var(--bg);
            padding: 18px; 
            border-radius: 22px; 
            font-weight: 800; 
            border: none; 
            cursor: pointer; 
            z-index: 100;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* MODALS */
        .modal { position: fixed; inset: 0; background: rgba(15,23,42,0.9); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .m-box { background: #1e293b; width: 100%; max-width: 400px; padding: 30px; border-radius: 32px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        input, textarea { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 16px; color: white; margin-bottom: 15px; outline: none; }
        input:focus { border-color: var(--p); }
        .btn-p { width: 100%; background: linear-gradient(45deg, var(--p), var(--s)); color: white; padding: 16px; border-radius: 16px; font-weight: 800; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <div class="glass-nav">
            <div class="balance"><i class="fa-solid fa-coins"></i> <span id="balVal">10</span></div>
            <button onclick="openM('redeemM')" style="background:rgba(255,255,255,0.05); color:white; border:1px solid rgba(255,255,255,0.1); padding:8px 15px; border-radius:12px; font-weight:600; cursor:pointer;">Redeem</button>
        </div>
        <div id="feed"></div>
    </div>

    <button class="fab" onclick="openM('postM')"><i class="fa-solid fa-plus"></i> NEW POST</button>

    <div id="postM" class="modal"><div class="m-box">
        <h2 style="margin-bottom:20px;">New Post</h2>
        <input type="text" id="inName" placeholder="Pseudonym">
        <textarea id="inMsg" placeholder="Share something..." rows="4" onkeyup="calc()"></textarea>
        <p id="cLab" style="font-size:12px; margin-bottom:15px; color:var(--p); font-weight:700;">Cost: 0 Postbox</p>
        <button class="btn-p" onclick="send()">PUBLISH</button>
        <p onclick="closeM('postM')" style="margin-top:15px; font-size:12px; cursor:pointer; opacity:0.5;">Cancel</p>
    </div></div>

    <div id="redeemM" class="modal"><div class="m-box">
        <h2 style="margin-bottom:10px;">Redeem Code</h2>
        <input type="text" id="codIn" placeholder="ENTER CODE" style="text-align:center; font-weight:800; letter-spacing:2px;">
        <button class="btn-p" onclick="claim()">CLAIM</button>
        <p id="rStat" style="margin-top:10px; font-size:12px; font-weight:600;"></p>
        <p onclick="closeM('redeemM')" style="margin-top:15px; font-size:12px; cursor:pointer; opacity:0.5;">Close</p>
    </div></div>

    <script>
        const _s = supabase.createClient('https://gevhkmpynlwhxohvsszw.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdldmhrbXB5bmx3aHhvaHZzc3p3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMTc5OTcsImV4cCI6MjA5Mzg5Mzk5N30.leq6VvuNVYoj_f2V8Qpk-4a0HneIE9YuDpxUW9Pd0_E');
        let balance = 10;

        function openM(id) { document.getElementById(id).style.display='flex'; }
        function closeM(id) { document.getElementById(id).style.display='none'; }
        function calc() { let c = Math.ceil(document.getElementById('inMsg').value.length / 20) * 5; document.getElementById('cLab').innerText = `Cost: ${c} Postbox`; return c; }

        async function loadFeed() {
            const { data } = await _s.from('eid_wishes').select('*').order('created_at', {ascending:false});
            document.getElementById('feed').innerHTML = (data || []).map(p => `
                <div class="post">
                    <span class="u-name">@${p.name}</span>
                    <div class="u-msg">${p.message}</div>
                    <div class="u-meta">
                        <span>${new Date(p.created_at).toLocaleDateString()}</span>
                        <span><i class="fa-solid fa-coins"></i> ${p.cost_paid || 0}</span>
                    </div>
                </div>
            `).join('');
        }

        async function send() {
            const c = calc(), n = document.getElementById('inName').value, m = document.getElementById('inMsg').value;
            if(!n || !m || balance < c) return;
            balance -= c; 
            await _s.from('eid_wishes').insert([{ name:n, message:m, cost_paid:c }]);
            document.getElementById('balVal').innerText = balance;
            closeM('postM'); 
            loadFeed();
        }

        async function claim() {
            const code = document.getElementById('codIn').value.trim().toUpperCase();
            const status = document.getElementById('rStat');
            let uID = localStorage.getItem('s_uid') || 'u_'+Math.random().toString(36).substr(2,9);
            localStorage.setItem('s_uid', uID);

            const { data: cData } = await _s.from('redeem_codes').select('*').eq('code', code).maybeSingle();
            if(!cData) { status.innerText = "Invalid Code"; status.style.color = "#ef4444"; return; }

            const { data: used } = await _s.from('redemptions').select('*').eq('user_id', uID).eq('code_id', cData.id).maybeSingle();
            if(used) { status.innerText = "Already Claimed"; status.style.color = "#f59e0b"; return; }

            await _s.from('redemptions').insert([{ user_id: uID, code_id: cData.id }]);
            balance += cData.value; 
            document.getElementById('balVal').innerText = balance;
            status.innerText = "Success!"; 
            status.style.color = "#10b981";
            setTimeout(() => closeM('redeemM'), 1000);
        }

        window.onload = loadFeed;
    </script>
</body>
</html>
