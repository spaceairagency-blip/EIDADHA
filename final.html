
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eid Mubarak</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #050010; overflow: hidden; }
        canvas { position: absolute; inset: 0; }
        #text { 
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            font-family: 'Cinzel', serif; font-size: 80px; color: #f5d06e;
            text-shadow: 0 0 30px #d4a82f; z-index: 10; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="text">Eid Mubarak</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function createFirework(x, y) {
            for(let i=0; i<80; i++) {
                let angle = Math.random() * Math.PI * 2;
                let velocity = Math.random() * 5 + 2;
                particles.push({ 
                    x, y, 
                    vx: Math.cos(angle) * velocity, 
                    vy: Math.sin(angle) * velocity, 
                    alpha: 1, 
                    color: `hsl(${Math.random() * 60 + 30}, 100%, 60%)` 
                });
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(5, 0, 16, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.alpha -= 0.01;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.alpha;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
                if(p.alpha <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(draw);
        }

        // Auto trigger
        window.onload = () => {
            draw();
            // Trigger fireworks every 800ms
            setInterval(() => createFirework(Math.random() * canvas.width, Math.random() * canvas.height * 0.7), 800);
            
            // Speak
            const msg = new SpeechSynthesisUtterance("Eid Mubarak");
            window.speechSynthesis.speak(msg);
        };
    </script>
</body>
</html>
