
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Persistent Cow</title>
    <style>
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #e0f7fa; font-family: sans-serif; }
        #cow { font-size: 100px; position: relative; transition: transform 0.2s; }
        #speech-bubble { visibility: hidden; background: #fff; padding: 8px 15px; border-radius: 12px; position: absolute; top: -60px; border: 2px solid #333; width: 200px; text-align: center; font-size: 12px; font-weight: bold; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #ff9800; border: none; border-radius: 10px; color: white; }
    </style>
</head>
<body>

    <button id="startBtn" onclick="initExperience()">Start Cow Show</button>

    <div id="cow">
        <div id="speech-bubble"></div>
        🐮
    </div>

    <script>
        const fullText = "Hey friend, You're gonna eat me now right? I can't wait!";
        const words = fullText.split(" ");
        const cow = document.getElementById('cow');
        const bubble = document.getElementById('speech-bubble');

        function initExperience() {
            // Hide the button once started
            document.getElementById('startBtn').style.display = 'none';
            // Start the infinite loop
            loopAction();
        }

        function loopAction() {
            // Trigger Animation
            cow.style.animation = 'none';
            void cow.offsetWidth; 
            cow.style.animation = 'jump 0.8s ease-in-out';
            
            // Trigger Speech
            bubble.style.visibility = 'visible';
            const utterance = new SpeechSynthesisUtterance(fullText);
            
            let wordIndex = 0;
            utterance.onboundary = (event) => {
                if (event.name === 'word') {
                    bubble.innerText = words.slice(0, wordIndex + 1).join(" ");
                    wordIndex++;
                }
            };
            
            utterance.onend = () => {
                bubble.style.visibility = 'hidden';
                // Wait 2 seconds, then go again
                setTimeout(loopAction, 2000);
            };

            window.speechSynthesis.speak(utterance);
        }
        // Redirects to the destination URL after 3 seconds (3000 milliseconds)
setTimeout(function() {
    window.location.href = "wow2.html";
}, 7000);

    </script>
    <style>
        @keyframes jump {
            0% { transform: translateY(0); }
            50% { transform: translateY(-150px) rotate(-10deg); }
            100% { transform: translateY(0); }
        }
    </style>
</body>
</html>
