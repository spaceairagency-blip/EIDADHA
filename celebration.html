<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Celebration - 5</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffd700 0%, #ff69b4 50%, #00bcd4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            text-align: center;
            z-index: 2;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: 140px;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.6);
            animation: popIn 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            margin: 0;
            letter-spacing: 8px;
        }

        .emoji-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        .emoji {
            font-size: 60px;
            animation: bounce 1.5s ease-in-out infinite;
        }

        .emoji:nth-child(1) {
            animation-delay: 0s;
        }

        .emoji:nth-child(2) {
            animation-delay: 0.2s;
        }

        .emoji:nth-child(3) {
            animation-delay: 0.4s;
        }

        .message {
            color: white;
            font-size: 28px;
            margin-top: 20px;
            font-weight: 300;
            letter-spacing: 2px;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .blessing {
            color: rgba(255, 255, 255, 0.95);
            font-size: 20px;
            margin-top: 20px;
            font-style: italic;
            animation: fadeInUp 1s ease-out 0.9s both;
            max-width: 600px;
            line-height: 1.6;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 1;
        }

        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.3) rotateY(-180deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotateY(0deg);
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-40px);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }

        .celebration-item {
            display: inline-block;
            margin: 10px;
            animation: scaleIn 0.6s ease-out;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 80px;
                letter-spacing: 4px;
            }

            .emoji {
                font-size: 40px;
            }

            .message {
                font-size: 18px;
                letter-spacing: 1px;
            }

            .blessing {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <h1>5</h1>
        <div class="emoji-container">
            <div class="emoji">🌙</div>
            <div class="emoji">🎉</div>
            <div class="emoji">🎊</div>
        </div>
        <audio autoplay >
            <source src="cow_sound.mp3" type="audio/mpeg">
        </audio>
        <p class="message">AAAA CELEBRATING TOGETHER!</p>
        <p class="blessing">May this blessed occasion bring joy, prosperity, and happiness to you and your loved ones. Eid Mubarak!</p>
    </div>

    <script>
        // Create twinkling particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 80; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 3 + 's';
            particlesContainer.appendChild(particle);
        }

        // Create confetti
        function createConfetti() {
            for (let i = 0; i < 60; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-10px';
                const colors = ['#ffd700', '#ff69b4', '#00bcd4', '#fff', '#90EE90'];
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animation = `fall ${2 + Math.random() * 3}s linear`;
                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 5000);
            }
        }

        // Voice announcement
        
        // Create initial confetti burst
        createConfetti();

        // Create more confetti periodically
        setInterval(createConfetti, 800);

        // Redrict to main.html
        setTimeout(function() {
            window.location.href = "main.html";
        }, 4000);
    </script>
</body>
</html>
